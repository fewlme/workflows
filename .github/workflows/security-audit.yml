# .github/workflows/security-audit.yml
name: Security Audit (Reusable)

on:
  workflow_call:
    inputs:
      severity_threshold:
        description: 'Minimum severity to report (critical|high|medium|low)'
        type: string
        default: 'high'
      create_issues:
        description: 'Create GitHub issues for findings'
        type: boolean
        default: true
      claude_model:
        description: 'Claude model to use'
        type: string
        default: 'claude-sonnet-5'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SLACK_WEBHOOK:
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Ensure issue labels exist
        if: ${{ inputs.create_issues }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create security --color "d93f0b" --description "Security vulnerability" --force
          gh label create critical --color "b60205" --description "Critical severity"      --force
          gh label create high     --color "e11d48" --description "High severity"          --force
          gh label create medium   --color "fbca04" --description "Medium severity"        --force
          gh label create low      --color "0e8a16" --description "Low severity"           --force

      - name: Detect stack
        id: stack
        run: |
          echo "has_composer=$([ -f composer.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_npm=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_python=$([ -f requirements.txt ] || [ -f pyproject.toml ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_docker=$([ -f Dockerfile ] || [ -f docker-compose.yml ] || [ -f compose.yml ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Detect the JS package manager (lockfile first, then packageManager field)
          PM=npm
          if   [ -f pnpm-lock.yaml ]; then PM=pnpm
          elif [ -f yarn.lock ];      then PM=yarn
          elif [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"pnpm' package.json; then PM=pnpm
          elif [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"yarn' package.json; then PM=yarn
          fi
          echo "node_pm=$PM" >> $GITHUB_OUTPUT

      # ---- Dependency audits ----

      - name: Setup PHP
        if: steps.stack.outputs.has_composer == 'true'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Composer audit
        if: steps.stack.outputs.has_composer == 'true'
        run: |
          composer install --no-progress --no-interaction --prefer-dist || true
          composer audit --format=json > composer-audit.json || true

      # Enable corepack BEFORE setup-node so its packageManager version probe
      # (e.g. `pnpm --version`) resolves instead of failing with "Unable to locate pnpm".
      - name: Enable corepack
        if: steps.stack.outputs.has_npm == 'true'
        run: corepack enable

      - name: Setup Node
        if: steps.stack.outputs.has_npm == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Node audit
        if: steps.stack.outputs.has_npm == 'true'
        env:
          PM: ${{ steps.stack.outputs.node_pm }}
        run: |
          case "$PM" in
            pnpm)
              pnpm audit --json > npm-audit.json 2>/dev/null || pnpm audit > npm-audit.txt 2>/dev/null || true
              ;;
            yarn)
              yarn npm audit --all --json > npm-audit.json 2>/dev/null || yarn audit --json > npm-audit.json 2>/dev/null || true
              ;;
            *)
              npm install --package-lock-only --ignore-scripts || true
              npm audit --json > npm-audit.json || true
              ;;
          esac

      - name: Setup Python
        if: steps.stack.outputs.has_python == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Python audit
        if: steps.stack.outputs.has_python == 'true'
        run: |
          pip install pip-audit
          pip-audit --format=json --output=pip-audit.json || true

      # ---- Secret + SAST scanning ----

      # Consumer repos may ship their own .gitleaks.toml; if they do, it wins.
      # Otherwise fall back to a shared default that extends the built-in rules
      # with an allowlist for the generic-api-key rule's most common false
      # positive: kebab/snake-case identifiers written as string literals
      # (CLI option names, config keys, header names).
      - name: Gitleaks config
        run: |
          if [ -f .gitleaks.toml ] || [ -f gitleaks.toml ]; then
            echo "Using repository gitleaks config"
            exit 0
          fi
          cat > "$RUNNER_TEMP/gitleaks-default.toml" <<'TOML'
          [extend]
          useDefault = true

          [allowlist]
          description = "Shared false-positive allowlist (fewlme/workflows security-audit)"
          regexes = [
            # Lowercase kebab/snake-case identifiers, optionally trailing '=' —
            # e.g. strpos($key, 'older-than-hours='), 'content-type', 'max_retries'.
            # Real keys are high-entropy and do not match this shape.
            '''^[a-z][a-z0-9]{1,20}(?:[-_][a-z0-9]{1,20}){1,5}=?$''',
          ]
          paths = [
            '''(^|/)(vendor|node_modules|\.venv|dist|build)/''',
            '''(^|/)(tests?|spec|specs|fixtures?|__tests__)/''',
            '''\.(lock|snap|map)$''',
            '''\.min\.js$''',
          ]
          TOML
          echo "GITLEAKS_CONFIG=$RUNNER_TEMP/gitleaks-default.toml" >> "$GITHUB_ENV"

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

      # Not returntocorp/semgrep-action@v1: it accepts only
      # [entryPoint, args, config, publishToken], so the `generateSarif` input
      # was silently ignored and no SARIF was ever produced for Claude to read.
      - name: Semgrep (SAST)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet --disable-pip-version-check semgrep==1.170.0
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --no-error --quiet || true
          if [ -f semgrep.sarif ]; then
            echo "semgrep.sarif written ($(wc -c < semgrep.sarif) bytes)"
          else
            echo "::warning::Semgrep produced no SARIF output"
          fi

      - name: Upload Semgrep SARIF
        if: hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@0499de31b99561a6d14a36a5f662c2a54f91beee  # v4.31.2
        with:
          sarif_file: semgrep.sarif

      - name: Trivy (deps + Docker + IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      # ---- Claude triage ----

      - name: Claude analysis & triage
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--max-turns 80 --model ${{ inputs.claude_model }} --allowedTools "Bash,Read,Grep,Glob,Edit,Write"'
          prompt: |
            You are a senior application security engineer auditing this repository.

            ## Context

            - Repository: ${{ github.repository }}
            - Severity threshold: ${{ inputs.severity_threshold }} (report only findings at this level or above)
            - Create issues: ${{ inputs.create_issues }}
            - GH CLI is authenticated and available as `gh`

            ## Inputs available in the working directory

            Tool reports (any may be missing if the stack doesn't apply):
            - `composer-audit.json` - PHP dependency vulnerabilities
            - `npm-audit.json` - JS/TS dependency vulnerabilities (pnpm projects may produce `npm-audit.txt` instead — read it if the JSON is absent)
            - `pip-audit.json` - Python dependency vulnerabilities
            - `trivy-report.json` - filesystem, dependency, Docker and IaC issues
            - Gitleaks results from the previous step (check job logs / SARIF)
            - Semgrep findings (SARIF, also visible in the GitHub Security tab)
            - The full source code of the repository

            ## Your task

            1. **Detect the stack** by inspecting the repository (frameworks, languages, build system, runtime). State what you found in one line.

            2. **Parse every tool report that exists** and build a unified, deduplicated list of findings.

            3. **Validate against the actual source** - read the code to confirm each finding is exploitable in context. Discard false positives, dev-only dependencies, test fixtures, and clearly unreachable code. Be ruthless about noise.

            4. **Manually review the code for issues the tools miss**, focusing on:
               - Injection: SQL, NoSQL, command, template, LDAP, header injection
               - Authentication: weak password handling, broken session management, missing rate limits on auth endpoints
               - Authorization: broken access control, IDOR, missing checks on routes/APIs/resources
               - Cryptography: weak algorithms, hardcoded keys, bad randomness, missing TLS verification
               - Hardcoded secrets, API keys, tokens, credentials in code or config
               - Insecure deserialization, unsafe `eval`-like patterns, prototype pollution
               - SSRF, XXE, open redirects, path traversal, zip slip
               - XSS (stored, reflected, DOM) and CSRF gaps
               - Insecure file upload handling (type, size, location, execution)
               - CORS misconfigurations, missing security headers, weak cookie flags
               - Dockerfile issues (root user, secrets in ENV, unpinned base images, no healthcheck on prod, unnecessary capabilities)
               - CI/CD issues (workflow secrets exposure, `pull_request_target` misuse, unpinned actions)
               - Dependency risks beyond CVEs (abandoned packages, suspicious typosquats)

            5. **For each confirmed issue**, produce:
               - Severity: critical | high | medium | low
               - CWE identifier if applicable
               - Exact file path and line numbers
               - 2-3 sentence explanation of the actual impact in *this* codebase (not a generic CWE description)
               - A concrete code-level fix (diff or replacement snippet)

            6. **Report only at severity `${{ inputs.severity_threshold }}` or above.**

            7. **If create_issues is `true`** (the value above):
               - For each finding, FIRST run: `gh issue list --label security --state open --search "<exact title>"`
               - If no match, run: `gh issue create --title "[Security][<severity>] <short description>" --label security --label "<severity>" --body "<body>"`
               - Body includes file:line, CWE, impact, suggested fix
               - Never include actual secret values in issue bodies — redact them

            8. **MANDATORY: Write a summary to `$GITHUB_STEP_SUMMARY`** by appending markdown to that file with `Write` or `Bash`. The summary MUST be written even if you find nothing, and MUST contain:
               - `## Security Audit Results`
               - Stack detected
               - Files/directories analyzed and tool reports parsed (list them; note any that were missing or failed)
               - Total findings count by severity
               - If no findings at threshold: `✅ No security issues found at severity \`${{ inputs.severity_threshold }}\` or above`
               - If findings: a markdown table with columns: Severity | File:Line | Issue | GitHub Issue (link or "skipped: already open")
               - At the very end: a one-line confirmation: `Audit complete. <N> issues created.`

            ## Rules

            - Be precise and skeptical. No noise, no duplicates, no theoretical issues without a concrete code reference.
            - If you cannot verify a finding against source code, lower its severity or drop it.
            - Never include actual secret values in issue bodies - redact them.
            - You MUST write the summary to $GITHUB_STEP_SUMMARY before ending. This is non-negotiable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Notifications ----

      - name: Slack notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "No Slack webhook configured, skipping notification"
            exit 0
          fi

          ISSUES_URL="${{ github.server_url }}/${{ github.repository }}/issues?q=is%3Aissue+is%3Aopen+label%3Asecurity"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            MSG="Security audit passed for *${{ github.repository }}*"
          else
            EMOJI="🚨"
            MSG="Security audit found issues in *${{ github.repository }}*"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${EMOJI} ${MSG}\n• Open issues: ${ISSUES_URL}\n• Run: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK"
