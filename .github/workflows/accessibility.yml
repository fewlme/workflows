# .github/workflows/accessibility.yml
name: Accessibility Audit (Reusable)

on:
  workflow_call:
    inputs:
      severity_threshold:
        type: string
        default: 'high'
      create_issues:
        type: boolean
        default: true
      claude_model:
        type: string
        default: 'claude-sonnet-5'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SLACK_WEBHOOK:
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Ensure issue labels exist
        if: ${{ inputs.create_issues }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create accessibility --color "1d76db" --description "Accessibility issue" --force
          gh label create critical      --color "b60205" --description "Critical severity"   --force
          gh label create high          --color "e11d48" --description "High severity"       --force
          gh label create medium        --color "fbca04" --description "Medium severity"     --force
          gh label create low           --color "0e8a16" --description "Low severity"        --force

      - name: Detect frontend stack
        id: stack
        run: |
          IS_FRONTEND=false
          # Scan every tracked package.json, not just the root: monorepo roots
          # (pnpm/turbo/nx workspaces) declare no deps — the apps live one level down.
          MANIFESTS=$(git ls-files '*package.json' ':!:**/node_modules/**')
          if [ -n "$MANIFESTS" ]; then
            if echo "$MANIFESTS" | xargs grep -qlE '"(next|react|vue|svelte|astro|nuxt|remix)"[[:space:]]*:' ; then
              IS_FRONTEND=true
            elif echo "$MANIFESTS" | xargs grep -qlE '"(tailwindcss|bootstrap|@mui/|antd|@chakra-ui|daisyui|@radix-ui|vuetify|primevue|@heroui|flowbite)' ; then
              IS_FRONTEND=true
            fi
          fi
          # Any rendered markup is auditable for WCAG, framework or not:
          # server-rendered templates and plain HTML count. Exclude build output,
          # vendored code and framework placeholder pages (e.g. writable/index.html)
          # so a backend-only repo isn't flagged as having a UI.
          if [ "$IS_FRONTEND" = "false" ] && \
             [ -n "$(git ls-files '*.blade.php' '*.twig' '*.erb' '*.html.heex' '*.jinja' '*.jinja2' '*.j2' '*.vue' '*.svelte' '*.html' \
                       ':!:**/node_modules/**' ':!:**/vendor/**' ':!:**/writable/**' \
                       ':!:**/dist/**' ':!:**/build/**' ':!:**/coverage/**' ':!:docs/**' | head -1)" ]; then
            IS_FRONTEND=true
          fi
          echo "is_frontend=$IS_FRONTEND" >> $GITHUB_OUTPUT

      - name: Skip if no frontend detected
        if: steps.stack.outputs.is_frontend != 'true'
        run: |
          echo "## Accessibility Audit Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No UI layer detected. Audit runs on JS-framework projects, projects using a UI/CSS library, or any repo containing HTML or server-rendered templates (Blade/Twig/ERB/Jinja)." >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: Claude accessibility review
        if: steps.stack.outputs.is_frontend == 'true'
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--max-turns 80 --model ${{ inputs.claude_model }} --allowedTools "Bash,Read,Grep,Glob,Edit,Write"'
          prompt: |
            You are an accessibility engineer auditing this frontend codebase against WCAG 2.2 AA standards.

            ## Context
            - Repository: ${{ github.repository }}
            - Severity threshold: ${{ inputs.severity_threshold }}
            - Create issues: ${{ inputs.create_issues }}
            - GH CLI is authenticated and available as `gh`

            ## Your task

            1. **Detect the framework** (React, Next.js, Vue, Svelte, Astro, etc.) and the styling approach (Tailwind, CSS modules, styled-components, etc.). One line. This may be a monorepo — the UI apps often live under `apps/*`, `packages/*` or similar, not at the root. Audit every app you find, and say which ones you covered.

            2. **Find all UI components and pages**. Focus on:
               - Component files (`.tsx`, `.jsx`, `.vue`, `.svelte`)
               - Server-rendered templates (`.blade.php`, `.twig`, `.erb`, `.jinja`) and plain `.html` pages, if the project uses them
               - Page/route files
               - Layout components
               - Form components especially
               - Modal, dropdown, menu, tab, accordion implementations

            3. **Review against WCAG 2.2 AA**, prioritizing real issues:

               **Semantics & structure**
               - Heading hierarchy (no `<h3>` before `<h2>`, one `<h1>` per page)
               - Landmark roles or HTML5 sectioning elements (`<main>`, `<nav>`, `<header>`, `<footer>`)
               - Lists implemented as `<ul>`/`<ol>`, not `<div>` soup
               - Buttons vs links: `<button>` for actions, `<a>` for navigation (not `<div onClick>`)

               **Keyboard accessibility**
               - All interactive elements reachable via Tab
               - Visible focus styles (not `outline: none` without replacement)
               - Custom interactive widgets handle keyboard (Enter/Space on buttons, Esc on modals, arrow keys on menus)
               - Focus trap in modals; focus restoration on close
               - No keyboard traps in custom components

               **Forms**
               - Every input has an associated `<label>` (or `aria-label`/`aria-labelledby`)
               - Error messages linked via `aria-describedby`
               - Required fields marked with `aria-required` or `required`
               - Validation errors announced (live regions or `aria-invalid`)
               - Logical tab order

               **Images & media**
               - `<img>` has meaningful `alt` (or `alt=""` if decorative)
               - `next/image` usage includes alt
               - Icon-only buttons have `aria-label`
               - Videos have captions/transcripts (flag missing)

               **Color & contrast**
               - Identify Tailwind/CSS color pairs likely below 4.5:1 (text) or 3:1 (large text / UI components)
               - Information not conveyed by color alone

               **ARIA**
               - No invalid ARIA roles or attributes
               - `aria-hidden` not on focusable elements
               - Live regions used appropriately (`aria-live`, `role="status"`, `role="alert"`)
               - Don't use ARIA when native HTML works (`<button>` over `role="button"` on a div)

               **Dynamic content**
               - Route changes announced (focus management on SPA navigation)
               - Toasts/notifications announced
               - Loading states communicated to screen readers

               **Motion & animation**
               - `prefers-reduced-motion` respected for non-essential animation
               - No autoplay or auto-scrolling content without controls

            4. **For each finding**:
               - Severity: critical (blocks users with disabilities) | high (significant barrier) | medium (workaround exists) | low (best practice gap)
               - WCAG criterion (e.g. 1.3.1, 2.4.7)
               - File path and line numbers
               - Concrete fix with code snippet showing before/after

            5. **Report only at severity `${{ inputs.severity_threshold }}` or above.**

            6. **If create_issues is `true`** (the value above):
               - For each finding, FIRST run: `gh issue list --label accessibility --state open --search "<exact title>"`
               - If no match, run: `gh issue create --title "[A11y][<severity>] <short description>" --label accessibility --label "<severity>" --body "<body>"`
               - Body includes WCAG ref, file:line, impact on real users, fix snippet

            7. **MANDATORY: Write a summary to `$GITHUB_STEP_SUMMARY`** by appending markdown to that file with `Write` or `Bash`. The summary MUST be written even if you find nothing, and MUST contain:
               - `## Accessibility Audit Results`
               - Framework detected
               - Components/pages analyzed (count and list of key paths)
               - Total findings count by severity
               - If no findings at threshold: `✅ No accessibility issues found at severity \`${{ inputs.severity_threshold }}\` or above`
               - If findings: a markdown table with columns: Severity | WCAG | File:Line | Issue | GitHub Issue (link or "skipped: already open")
               - At the very end: a one-line confirmation: `Audit complete. <N> issues created.`

            ## Rules
            - Tie every finding to actual JSX/template code. No theoretical "you should use ARIA" without showing what to ARIA-ify.
            - Don't flag third-party component libraries (e.g. shadcn/ui, Radix, Headless UI primitives) unless they're clearly used incorrectly — they handle a11y internally.
            - Skip findings on storybook stories, test files, or example/demo folders.
            - For Tailwind contrast issues, name the specific class pair (e.g. `text-gray-400 on bg-white`) and suggest the fix.
            - You MUST write the summary to $GITHUB_STEP_SUMMARY before ending. This is non-negotiable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && exit 0
          ISSUES_URL="${{ github.server_url }}/${{ github.repository }}/issues?q=is%3Aissue+is%3Aopen+label%3Aaccessibility"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"♿ A11y audit complete for *${{ github.repository }}*\n• Issues: ${ISSUES_URL}\n• Run: ${RUN_URL}\"}" "$SLACK_WEBHOOK"
