# .github/workflows/dependency-health.yml
name: Dependency Health (Reusable)

on:
  workflow_call:
    inputs:
      create_issues:
        type: boolean
        default: true
      claude_model:
        type: string
        default: 'claude-sonnet-4-6'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SLACK_WEBHOOK:
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Ensure issue labels exist
        if: ${{ inputs.create_issues }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create dependencies --color "0366d6" --description "Dependency health" --force

      - name: Detect stack
        id: stack
        run: |
          echo "has_composer=$([ -f composer.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_npm=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_python=$([ -f requirements.txt ] || [ -f pyproject.toml ] && echo true || echo false)" >> $GITHUB_OUTPUT
          # Detect the JS package manager (lockfile first, then packageManager field)
          PM=npm
          if   [ -f pnpm-lock.yaml ]; then PM=pnpm
          elif [ -f yarn.lock ];      then PM=yarn
          elif [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"pnpm' package.json; then PM=pnpm
          elif [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"yarn' package.json; then PM=yarn
          fi
          echo "node_pm=$PM" >> $GITHUB_OUTPUT

      - name: Setup PHP
        if: steps.stack.outputs.has_composer == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Composer outdated
        if: steps.stack.outputs.has_composer == 'true'
        run: |
          composer install --no-progress --no-interaction --prefer-dist || true
          composer outdated --format=json --direct > composer-outdated.json || true

      # Enable corepack BEFORE setup-node so its packageManager version probe
      # (e.g. `pnpm --version`) resolves instead of failing with "Unable to locate pnpm".
      - name: Enable corepack
        if: steps.stack.outputs.has_npm == 'true'
        run: corepack enable

      - name: Setup Node
        if: steps.stack.outputs.has_npm == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Node outdated
        if: steps.stack.outputs.has_npm == 'true'
        env:
          PM: ${{ steps.stack.outputs.node_pm }}
        run: |
          case "$PM" in
            pnpm)
              pnpm install --frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile --ignore-scripts || true
              pnpm outdated --format json > npm-outdated.json 2>/dev/null || pnpm outdated > npm-outdated.txt 2>/dev/null || true
              pnpm ls --recursive --depth Infinity --json > npm-tree.json 2>/dev/null || true
              ;;
            yarn)
              yarn install --immutable || yarn install || true
              yarn outdated --json > npm-outdated.json 2>/dev/null || yarn outdated > npm-outdated.txt 2>/dev/null || true
              ;;
            *)
              npm install --package-lock-only --ignore-scripts || true
              npm outdated --json > npm-outdated.json || true
              npm ls --json --all > npm-tree.json 2>/dev/null || true
              ;;
          esac

      - name: Setup Python
        if: steps.stack.outputs.has_python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Python outdated
        if: steps.stack.outputs.has_python == 'true'
        run: pip list --outdated --format=json > pip-outdated.json || true

      - name: Claude dependency review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--max-turns 60 --model ${{ inputs.claude_model }} --allowedTools "Bash,Read,Grep,Glob,Write"'
          prompt: |
            You are a dependency management expert reviewing outdated packages in this repository.

            ## Context
            - Repository: ${{ github.repository }}
            - Create issues: ${{ inputs.create_issues }}
            - GH CLI is authenticated and available as `gh`

            ## Inputs
            - `composer-outdated.json`, `npm-outdated.json`, `pip-outdated.json` (any may be missing)
            - For pnpm/yarn projects the report may instead be `npm-outdated.txt` (plain text) — read it if the JSON is absent
            - `npm-tree.json` for transitive deps
            - Full source code

            ## Your task

            1. **Detect the stack** in one line.

            2. **For each outdated direct dependency**, classify it into one of:
               - **safe**: patch or minor bump, no breaking changes per changelog, low usage in code
               - **review**: minor/major with notable changes, requires code adjustments, but worth doing
               - **risky**: major bump with breaking API changes, heavy usage in this codebase, needs careful migration
               - **skip**: pinned for a known reason, framework constraint, or replaced by a fork

            3. **For each `review` and `risky` package**, check the actual usage in the source code:
               - How many files use it? Which APIs?
               - What breaking changes apply to those APIs (consult known changelogs of well-known packages)?
               - Estimate migration effort: trivial / 1-2h / half-day / multi-day

            4. **Identify abandoned or risky packages**:
               - Packages that haven't been updated in over 2 years
               - Packages with very few downloads or maintainer flight
               - Packages superseded by official replacements

            5. **Group findings into a quarterly upgrade plan**:
               - "Do now" (safe + review with low effort)
               - "Plan this sprint" (review with medium effort, or security-adjacent)
               - "Schedule" (risky majors needing migration time)
               - "Replace" (abandoned packages with suggested alternatives)

            6. **If create_issues is `true`** (the value above), open ONE summary issue:
               - FIRST run: `gh issue list --label dependencies --state open --search "Dependency health report" --json number,createdAt` and check whether any returned issue was created in the last 30 days. If yes, skip creation (idempotent).
               - If no recent report exists, run: `gh issue create --title "[Deps] Dependency health report - $(date +%Y-%m-%d)" --label dependencies --body "<body>"`
               - Body is the full quarterly upgrade plan as a checklist: `- [ ] package: from X to Y (effort: ...)`

            7. **MANDATORY: Write a summary to `$GITHUB_STEP_SUMMARY`** by appending markdown to that file with `Write` or `Bash`. The summary MUST be written even if there are no outdated packages, and MUST contain:
               - `## Dependency Health Report`
               - Stack detected
               - Ecosystems analyzed (composer / npm / pip — list which reports were parsed, note any missing)
               - Counts by bucket: safe / review / risky / skip / abandoned
               - If everything is up to date: `✅ All direct dependencies are current`
               - Otherwise: the quarterly upgrade plan (Do now / Plan this sprint / Schedule / Replace) and a link to the summary issue (or "skipped: recent report already open")
               - At the very end: a one-line confirmation: `Audit complete. <N> issues created.`

            ## Rules
            - Don't suggest upgrading dev-only deps unless they break the build or are abandoned.
            - For frameworks (CodeIgniter, Next.js, Laravel, React), check the project's actual usage before recommending major upgrades.
            - Never recommend blind `--latest` upgrades. Always group and explain.
            - You MUST write the summary to $GITHUB_STEP_SUMMARY before ending. This is non-negotiable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && exit 0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"📦 Dependency report ready for *${{ github.repository }}*\n${RUN_URL}\"}" "$SLACK_WEBHOOK"
