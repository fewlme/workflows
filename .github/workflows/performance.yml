# .github/workflows/performance.yml
name: Performance Audit (Reusable)

on:
  workflow_call:
    inputs:
      severity_threshold:
        type: string
        default: 'high'
      create_issues:
        type: boolean
        default: true
      claude_model:
        type: string
        default: 'claude-sonnet-4-5'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SLACK_WEBHOOK:
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Claude performance review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--max-turns 80 --model ${{ inputs.claude_model }} --allowedTools "Bash,Read,Grep,Glob,Edit,Write"'
          prompt: |
            You are a performance engineer reviewing this repository for runtime and build-time performance issues.

            ## Context
            - Repository: ${{ github.repository }}
            - Severity threshold: ${{ inputs.severity_threshold }}
            - Create issues: ${{ inputs.create_issues }}
            - GH CLI is authenticated and available as `gh`

            ## Your task

            1. **Detect the stack and runtime profile** (backend/frontend/full-stack, framework, DB if any). One line.

            2. **Review the code for performance issues** in priority order:

               **Backend (PHP, Node, Python, etc.)**
               - N+1 query patterns (loops calling DB inside)
               - Missing indexes implied by WHERE/JOIN/ORDER BY on non-indexed columns
               - SELECT * on wide tables, fetching more than needed
               - Synchronous I/O in request paths that should be async or queued
               - Heavy work in middleware or boot phase
               - Missing caching on hot read paths
               - Large object serialization in hot paths
               - Synchronous external HTTP calls without timeout/retry
               - Memory leaks
               - Inefficient algorithms: O(n²) where O(n) is trivial

               **Frontend (React, Next.js, etc.)**
               - Re-renders: missing memoization, unstable props, context churn
               - Bundle size: heavy libs in client components, missing dynamic imports
               - Images not optimized
               - Sequential fetches that could be parallel
               - CSR data that could be SSR/ISR/static
               - Large lists without virtualization
               - Blocking scripts, no defer/async

               **Build / CI**
               - Slow build steps without caching
               - Tests serial where parallel is possible

            3. **For each finding**:
               - Severity: critical | high | medium | low
               - File path and line numbers
               - Why slow in *this* codebase (impact estimate)
               - Concrete fix with code snippet

            4. **Report only at severity `${{ inputs.severity_threshold }}` or above.**

            5. **If create_issues is `true`** (the value above):
               - For each finding, FIRST run: `gh issue list --label performance --state open --search "<exact title>"`
               - If no match, run: `gh issue create --title "[Perf][<severity>] <short>" --label performance --label "<severity>" --body "<body>"`
               - Body includes file:line, why slow, fix snippet

            6. **MANDATORY: Write a summary to `$GITHUB_STEP_SUMMARY`** by appending markdown to that file with `Write` or `Bash`. The summary MUST be written even if you find nothing, and MUST contain:
               - `## Performance Audit Results`
               - Stack detected
               - Files/directories analyzed (list them)
               - Total findings count by severity
               - If no findings at threshold: `✅ No performance issues found at severity \`${{ inputs.severity_threshold }}\` or above`
               - If findings: a markdown table with columns: Severity | File:Line | Issue | GitHub Issue (link or "skipped: already open")
               - At the very end: a one-line confirmation: `Audit complete. <N> issues created.`

            ## Rules
            - Tie every finding to real code paths.
            - No premature micro-optimization.
            - If you can't tell hot vs cold, lower severity.
            - You MUST write the summary to $GITHUB_STEP_SUMMARY before ending. This is non-negotiable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}